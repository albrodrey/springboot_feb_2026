spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${HOST_DB}:${PORT_DB}/alumnoscursos
spring.datasource.username=${USER_DB}
spring.datasource.password=${PASS_DB}
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
security.db.driver=com.mysql.cj.jdbc.Driver
security.db.url=jdbc:mysql://${HOST_DB}:${PORT_DB}/springsecurity
security.db.user=${USER_DB}
security.db.password=${PASS_DB};
jwt.properties.clave=11111111111111111111111111aaaaaaaaaaaaaaaaaaaaa
jwt.properties.timeout=84000000